<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-back-button routerLink="/report-list" slot="start"></ion-back-button>
    <ion-title>Crear reporte</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <form [formGroup]="reportForm" (ngSubmit)="saveReport()">
    <ion-item>
      <ion-input 
      type="text" 
      formControlName="title" 
      label="Título"
      labelPlacement="floating"
      >
    </ion-input>
    </ion-item>

    <ion-item>
      <ion-textarea
        type="text"
        formControlName="description"
        label="Descripción"
        labelPlacement="floating"
        rows="4"
      ></ion-textarea>
    </ion-item>

  @if (isLoadingWeather()) {
    <ion-skeleton-text animated="true" style="width: 80%; height: 20px;"></ion-skeleton-text>
  } @else if (weatherInfo()) { 
    <p>{{ weatherInfo() }}</p>
  } @else {
    <p>Sin conexión, no se pudo obtener clima</p>
  }

  @if (latitude() && longitude()) {
    <ion-label>Latitud: {{ latitude() }}, Longitud: {{ longitude() }}</ion-label>
  }

  <ion-button 
  type="submit"
  expand="block"
  [disabled]="!reportForm.valid || isLoadingWeather()"
  >Guardar</ion-button>

  @if (errorMessage()) {
    <p class="error-message">{{ errorMessage() }}</p>
  }
  </form>
</ion-content>
