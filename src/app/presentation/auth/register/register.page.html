<ion-content [fullscreen]="true" class="auth-content">
  <div class="auth-container">

    <div class="brand">
      <div class="brand-icon">📍</div>
      <h1 class="brand-title">Via Report</h1>
      <p class="brand-subtitle">Crea tu cuenta gratuita</p>
    </div>

    <div class="auth-card">
      <h2 class="card-title">Crear cuenta</h2>

      <form [formGroup]="registerForm" (ngSubmit)="register()">

        <app-custom-input
          [control]="registerForm.get('fullName')!"
          label="Nombre completo"
          type="text"
          variant="dark"
          errorMessage="Mínimo 3 caracteres">
        </app-custom-input>

        <app-custom-input
          [control]="registerForm.get('email')!"
          label="Correo electrónico"
          type="email"
          variant="dark"
          errorMessage="Ingresa un correo válido">
        </app-custom-input>

        <app-custom-input
          [control]="registerForm.get('password')!"
          label="Contraseña"
          type="password"
          variant="dark"
          errorMessage="Mínimo 6 caracteres">
        </app-custom-input>

        @if (errorMessage()) {
          <div class="error-banner">⚠️ {{ errorMessage() }}</div>
        }

        <ion-button
          type="submit"
          expand="block"
          class="submit-btn"
          [disabled]="isLoading() || registerForm.invalid">
          {{ isLoading() ? 'Creando cuenta...' : 'Crear cuenta' }}
        </ion-button>

        <div class="divider">¿Ya tienes cuenta?</div>

        <ion-button
          fill="outline"
          expand="block"
          class="secondary-btn"
          routerLink="/login">
          Iniciar sesión
        </ion-button>

      </form>
    </div>

  </div>
</ion-content>
