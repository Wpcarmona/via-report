<ion-content [fullscreen]="true" class="auth-content">
  <div class="auth-container">

    <div class="brand">
      <div class="brand-icon">📍</div>
      <h1 class="brand-title">Via Report</h1>
      <p class="brand-subtitle">Reporta incidentes viales</p>
    </div>

    <div class="auth-card">
      <h2 class="card-title">Iniciar sesión</h2>

      <form [formGroup]="loginForm" (ngSubmit)="login()">

        <app-custom-input
          [control]="loginForm.get('email')!"
          label="Correo electrónico"
          type="email"
          variant="dark"
          errorMessage="Ingresa un correo válido">
        </app-custom-input>

        <app-custom-input
          [control]="loginForm.get('password')!"
          label="Contraseña"
          type="password"
          variant="dark"
          errorMessage="Mínimo 6 caracteres">
        </app-custom-input>

        @if (errorMessage()) {
          <div class="error-banner">⚠️ {{ errorMessage() }}</div>
        }

        <ion-button
          type="submit"
          expand="block"
          class="submit-btn"
          [disabled]="isLoading() || loginForm.invalid">
          {{ isLoading() ? 'Ingresando...' : 'Ingresar' }}
        </ion-button>

        <div class="divider">¿No tienes cuenta?</div>

        <ion-button
          fill="outline"
          expand="block"
          class="secondary-btn"
          routerLink="/register">
          Crear cuenta
        </ion-button>

      </form>
    </div>

  </div>
</ion-content>
